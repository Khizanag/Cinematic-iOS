name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint (strict)
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  package-tests:
    name: ${{ matrix.package }} (swift test)
    runs-on: macos-26
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package: [MVIKit, CinematicDomain, CinematicData]
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version
      - name: Test
        run: swift test --package-path Package/${{ matrix.package }}

  simulator-tests:
    name: ${{ matrix.scheme }} (simulator)
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: CinematicDesign
            flags: ""
          - scheme: CinematicPresentation
            flags: ""
          - scheme: Cinematic
            flags: -project Cinematic.xcodeproj
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version
      - name: Resolve simulator destination
        id: simulator
        run: |
          device=$(xcrun simctl list devices available | grep -E "iPhone (17|16)" | head -1 | sed -E 's/^ *([^(]*[^ (]) *\(.*/\1/')
          echo "Using simulator: $device"
          echo "device=$device" >> "$GITHUB_OUTPUT"
      - name: Test
        run: >
          xcodebuild test ${{ matrix.flags }}
          -scheme ${{ matrix.scheme }}
          -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}"
        working-directory: ${{ matrix.scheme == 'Cinematic' && '.' || format('Package/{0}', matrix.scheme) }}

  coverage:
    name: Coverage badge
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package-tests
    runs-on: macos-26
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Run pure-package tests with coverage
        run: |
          for package in MVIKit CinematicDomain CinematicData; do
            swift test --package-path "Package/$package" --enable-code-coverage
          done
      - name: Write coverage badge
        run: python3 Scripts/coverage-badge.py
      - name: Commit badge when it changes
        run: |
          if git diff --quiet docs/coverage.json; then
            echo "coverage unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/coverage.json
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi
