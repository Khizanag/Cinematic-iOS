<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23141320'/%3E%3Cpath d='M40 32 L70 50 L40 68 Z' fill='%238A84FB'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0B0A12; --surface: #1C1B27; --surface-2: #141320;
      --text: #F4F4FA; --text-dim: #A8A8BE; --accent: #8A84FB; --separator: #2A2A3A;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px; line-height: 1.65; -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .site-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: rgba(11, 10, 18, 0.72);
      backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--separator);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--text); font-size: 18px; }
    .brand svg { width: 26px; height: 26px; }
    .ghlink {
      border: 1px solid var(--separator); border-radius: 999px; padding: 7px 16px;
      color: var(--text); font-weight: 600; font-size: 14px;
    }
    .ghlink:hover { border-color: var(--accent); text-decoration: none; }
    main {
      max-width: 860px; margin: 0 auto; padding: 32px 24px 96px;
    }
    h1, h2, h3, h4 { line-height: 1.25; font-weight: 700; letter-spacing: -0.01em; }
    h1 { font-size: 2.6rem; margin: 0.2em 0 0.4em; }
    h2 { font-size: 1.7rem; margin-top: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--separator); }
    h3 { font-size: 1.3rem; margin-top: 1.6em; }
    p, li { color: #D8D8E2; }
    img { max-width: 100%; border-radius: 12px; }
    code {
      font-family: 'SF Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88em; background: var(--surface); padding: 2px 6px; border-radius: 6px; color: #E6C9F5;
    }
    pre {
      background: var(--surface-2); border: 1px solid var(--separator); border-radius: 12px;
      padding: 18px 20px; overflow-x: auto;
    }
    pre code { background: none; padding: 0; color: #CFCFE0; }
    blockquote { border-left: 3px solid var(--accent); margin: 1em 0; padding: 0.2em 1em; color: var(--text-dim); }
    table { border-collapse: collapse; width: 100%; margin: 1.2em 0; font-size: 0.95rem; }
    th, td { border: 1px solid var(--separator); padding: 10px 14px; text-align: left; vertical-align: top; }
    th { background: var(--surface); }
    tr:nth-child(even) td { background: rgba(28, 27, 39, 0.4); }
    .mermaid { margin: 1.5em 0; text-align: center; }
    hr { border: none; border-top: 1px solid var(--separator); margin: 2.5em 0; }
    footer.site-footer {
      max-width: 860px; margin: 0 auto; padding: 24px; border-top: 1px solid var(--separator);
      color: var(--text-dim); font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">
      <svg viewBox="0 0 100 100" aria-hidden="true"><rect width="100" height="100" rx="22" fill="#141320"/><path d="M40 32 L70 50 L40 68 Z" fill="#8A84FB"/></svg>
      Cinematic
    </a>
    <a class="ghlink" href="https://github.com/Khizanag/Cinematic-iOS">View on GitHub ↗</a>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    Cinematic — an open-source MVI + Clean Architecture reference for SwiftUI.
    <a href="https://github.com/Khizanag/Cinematic-iOS">Source on GitHub</a> · MIT License.
  </footer>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    document.querySelectorAll('pre > code.language-mermaid').forEach((node) => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = node.textContent;
      node.parentElement.replaceWith(div);
    });
    mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: { fontFamily: 'inherit' } });
    await mermaid.run();
  </script>
</body>
</html>
